openapi: 3.0.0

info:
  title: AVMD Search Engine API (Golang edition)
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Flights
  - name: Geo
  - name: Booking

paths:
  /api/v1/booking/contact-details/{searchId}:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    post:
      tags: [Booking]
      operationId: submitBookingContactDetails
      parameters:
        - $ref: "#/components/parameters/SearchIDPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingContactDetails"
      responses:
        "204":
          description: No Content
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/booking/passenger-data:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    post:
      tags: [Booking]
      operationId: submitPassengerData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerDataRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassengerDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/booking/seats:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Booking]
      operationId: getSeatMap
      parameters:
        - $ref: "#/components/parameters/SearchIDParam"
        - $ref: "#/components/parameters/OfferIDParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SegmentSeatMap"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/booking/selected-offer:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Booking]
      operationId: getSelectedOffer
      parameters:
        - $ref: "#/components/parameters/SearchIDParam"
        - $ref: "#/components/parameters/OfferIDParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelectedOffer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/countries:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Geo]
      operationId: listCountries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"
    post:
      tags: [Geo]
      operationId: createCountry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/countries/{id}:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Geo]
      operationId: getCountry
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Geo]
      operationId: updateCountry
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Geo]
      operationId: deleteCountry
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/cities:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Geo]
      operationId: listCities
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"
    post:
      tags: [Geo]
      operationId: createCity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CityRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/cities/dropdown:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Geo]
      operationId: getCitiesDropdown
      parameters:
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/OriginAirportCodeParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CityDropdown"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/cities/{id}:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Geo]
      operationId: getCity
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Geo]
      operationId: updateCity
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CityRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Geo]
      operationId: deleteCity
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/airports:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Geo]
      operationId: listAirports
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Airport"
    post:
      tags: [Geo]
      operationId: createAirport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirportRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/airports/{id}:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Geo]
      operationId: getAirport
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airport"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Geo]
      operationId: updateAirport
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirportRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Geo]
      operationId: deleteAirport
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/flights/calendar:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Flights]
      operationId: getCalendar
      parameters:
        - $ref: "#/components/parameters/DepartureAirportCodeParam"
        - $ref: "#/components/parameters/ArrivalAirportCodeParam"
        - $ref: "#/components/parameters/DateFromParam"
        - $ref: "#/components/parameters/DateToParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/flights/search:
    parameters:
      - $ref: "#/components/parameters/LocaleHeaderParam"
    get:
      tags: [Flights]
      operationId: searchFlights
      parameters:
        - $ref: "#/components/parameters/DepartureAirportCodeParam"
        - $ref: "#/components/parameters/ArrivalAirportCodeParam"
        - $ref: "#/components/parameters/DepartureDateParam"
        - $ref: "#/components/parameters/ReturnDateParam"
        - $ref: "#/components/parameters/AdultCountParam"
        - $ref: "#/components/parameters/ChildCountParam"
        - $ref: "#/components/parameters/InfantCountParam"
        - $ref: "#/components/parameters/MinPriceParam"
        - $ref: "#/components/parameters/MaxPriceParam"
        - $ref: "#/components/parameters/MinSegmentsParam"
        - $ref: "#/components/parameters/MaxSegmentsParam"
        - $ref: "#/components/parameters/MinTotalDurationMinutesParam"
        - $ref: "#/components/parameters/MaxTotalDurationMinutesParam"
        - $ref: "#/components/parameters/MinIndividualSegmentDurationMinutesParam"
        - $ref: "#/components/parameters/MaxIndividualSegmentDurationMinutesParam"
        - $ref: "#/components/parameters/MinLayoverMinutesParam"
        - $ref: "#/components/parameters/MaxLayoverMinutesParam"
        - $ref: "#/components/parameters/DepartureOutboundFromParam"
        - $ref: "#/components/parameters/DepartureOutboundToParam"
        - $ref: "#/components/parameters/ArrivalOutboundFromParam"
        - $ref: "#/components/parameters/ArrivalOutboundToParam"
        - $ref: "#/components/parameters/DepartureInboundFromParam"
        - $ref: "#/components/parameters/DepartureInboundToParam"
        - $ref: "#/components/parameters/ArrivalInboundFromParam"
        - $ref: "#/components/parameters/ArrivalInboundToParam"
      responses:
        "200":
          description: Server-sent events stream. Emits `search_id`, `offers`, and `done` events.
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: search_id
                data: {"search_id":"..."}

                event: offers
                data: {"offers":[]}

                event: done
                data: {"search_id":"..."}
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  parameters:
    LocaleHeaderParam:
      name: Accept-Language
      in: header
      required: false
      description: Language preference (en, ro, ru)
      schema:
        type: string
        enum: [en, ro, ru]
        default: en
    SearchIDParam:
      name: searchId
      in: query
      required: true
      schema:
        type: string
    SearchIDPathParam:
      name: searchId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    OfferIDParam:
      name: offerId
      in: query
      required: true
      schema:
        type: string
        minLength: 1
    IDParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    SearchParam:
      name: search
      in: query
      required: true
      schema:
        type: string
        minLength: 2
    OriginAirportCodeParam:
      name: originAirportCode
      in: query
      required: false
      schema:
        type: string
        pattern: "^[A-Za-z]{3}$"
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 5
        maximum: 100
        default: 50
    DepartureAirportCodeParam:
      name: departureAirportCode
      in: query
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 3
        pattern: "^[A-Z]{3}$"
        x-oapi-codegen-extra-tags:
          validate: required,len=3,uppercase,alpha
    ArrivalAirportCodeParam:
      name: arrivalAirportCode
      in: query
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 3
        pattern: "^[A-Z]{3}$"
        x-oapi-codegen-extra-tags:
          validate: required,len=3,uppercase,alpha
    DepartureDateParam:
      name: departureDate
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    ReturnDateParam:
      name: returnDate
      in: query
      required: false
      schema:
        type: string
        format: date
    DateFromParam:
      name: dateFrom
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    DateToParam:
      name: dateTo
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    AdultCountParam:
      name: adultCount
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        format: int32
        x-oapi-codegen-extra-tags:
          validate: required,min=1
    ChildCountParam:
      name: childCount
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    InfantCountParam:
      name: infantCount
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinPriceParam:
      name: minPrice
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        format: double
    MaxPriceParam:
      name: maxPrice
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        format: double
    MinSegmentsParam:
      name: minSegments
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxSegmentsParam:
      name: maxSegments
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinTotalDurationMinutesParam:
      name: minTotalDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxTotalDurationMinutesParam:
      name: maxTotalDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinIndividualSegmentDurationMinutesParam:
      name: minIndividualSegmentDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxIndividualSegmentDurationMinutesParam:
      name: maxIndividualSegmentDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinLayoverMinutesParam:
      name: minLayoverMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxLayoverMinutesParam:
      name: maxLayoverMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    DepartureOutboundFromParam:
      name: departureOutboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureOutboundToParam:
      name: departureOutboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalOutboundFromParam:
      name: arrivalOutboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalOutboundToParam:
      name: arrivalOutboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureInboundFromParam:
      name: departureInboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureInboundToParam:
      name: departureInboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalInboundFromParam:
      name: arrivalInboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalInboundToParam:
      name: arrivalInboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
  schemas:
    PassengerDataRequest:
      type: object
      required: [search_id, offer_id, passengers, contact_data]
      properties:
        search_id:
          type: string
          minLength: 1
        offer_id:
          type: string
          minLength: 1
        passengers:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PassengerDataPassenger"
        contact_data:
          $ref: "#/components/schemas/PassengerContactData"
        supplier_parameters:
          type: array
          items:
            $ref: "#/components/schemas/CustomSupplierParameter"
    PassengerDataPassenger:
      type: object
      required: [title, first_name, last_name, date_of_birth, citizenship_country_code]
      properties:
        title:
          type: string
          enum: [Mr, Mrs, Miss]
        first_name:
          type: string
          minLength: 1
        last_name:
          type: string
          minLength: 1
        date_of_birth:
          type: string
          format: date
        citizenship_country_code:
          type: string
          pattern: "^[A-Z]{2}$"
        supplier_parameters:
          type: array
          items:
            $ref: "#/components/schemas/CustomSupplierParameter"
    PassengerContactData:
      type: object
      required: [email, phone]
      properties:
        email:
          type: string
          format: email
        phone:
          $ref: "#/components/schemas/PassengerPhone"
    BookingContactDetails:
      type: object
      required: [email, phone]
      properties:
        email:
          type: string
          format: email
        phone:
          $ref: "#/components/schemas/PassengerPhone"
    PassengerPhone:
      type: object
      required: [international_code, number]
      properties:
        international_code:
          type: string
          minLength: 1
        number:
          type: string
          minLength: 1
    CustomSupplierParameter:
      type: object
      required: [param_name, param_value]
      properties:
        param_name:
          type: string
        param_value:
          type: string
          minLength: 1
    PassengerDataResponse:
      type: object
      required: [supplier_responses]
      properties:
        routing_id:
          type: string
        tf_booking_reference:
          type: string
        final_amount:
          type: number
          format: double
        final_currency:
          type: string
        supplier_visual_authorisation_image_url:
          type: string
        supplier_responses:
          type: array
          items:
            $ref: "#/components/schemas/ProcessTermsSupplierResponse"
    ProcessTermsSupplierResponse:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        data:
          type: string
    SegmentSeatMap:
      type: object
      required: [segment_id, origin, destination, flight_number, seats]
      properties:
        segment_id:
          type: integer
          format: int32
        origin:
          type: string
        destination:
          type: string
        flight_number:
          type: string
        seats:
          type: array
          items:
            $ref: "#/components/schemas/SeatDetail"
    SeatDetail:
      type: object
      required: [code, type, row, col, available, persons_with_reduced_mobility, no_infant_seat]
      properties:
        code:
          type: string
        type:
          $ref: "#/components/schemas/SeatType"
        seat_description:
          type: string
        price:
          type: number
          format: double
        currency_code:
          type: string
        row:
          type: integer
          format: int32
        col:
          type: integer
          format: int32
        available:
          type: boolean
        persons_with_reduced_mobility:
          type: boolean
        no_infant_seat:
          type: boolean
    SeatType:
      type: string
      enum: [STANDARD, EXIT_ROW, WINDOW, AISLE, CENTRE, MIDDLE, EXTRA_LEGROOM]
    SelectedOffer:
      type: object
      required: [offer, search_params, additional_fields]
      properties:
        offer:
          $ref: "#/components/schemas/Offer"
        search_params:
          $ref: "#/components/schemas/FlightSearchParams"
        contact_details:
          $ref: "#/components/schemas/BookingContactDetails"
        additional_fields:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalField"
    FlightSearchParams:
      type: object
      required: [departure_airport_code, arrival_airport_code, departure_date, adult_count]
      properties:
        departure_airport_code:
          type: string
        arrival_airport_code:
          type: string
        departure_date:
          type: string
          format: date
        return_date:
          type: string
          format: date
        adult_count:
          type: integer
