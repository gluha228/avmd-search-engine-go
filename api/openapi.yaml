openapi: 3.0.0

info:
  title: AVMD Search Engine API
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Flights
  - name: Geo

paths:
  /api/v1/countries:
    get:
      tags: [Geo]
      operationId: listCountries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"
    post:
      tags: [Geo]
      operationId: createCountry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/countries/{id}:
    get:
      tags: [Geo]
      operationId: getCountry
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Geo]
      operationId: updateCountry
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Geo]
      operationId: deleteCountry
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/cities:
    get:
      tags: [Geo]
      operationId: listCities
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"
    post:
      tags: [Geo]
      operationId: createCity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CityRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/cities/dropdown:
    get:
      tags: [Geo]
      operationId: getCitiesDropdown
      parameters:
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/OriginAirportCodeParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CityDropdown"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/cities/{id}:
    get:
      tags: [Geo]
      operationId: getCity
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Geo]
      operationId: updateCity
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CityRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/City"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Geo]
      operationId: deleteCity
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/airports:
    get:
      tags: [Geo]
      operationId: listAirports
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Airport"
    post:
      tags: [Geo]
      operationId: createAirport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirportRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/airports/{id}:
    get:
      tags: [Geo]
      operationId: getAirport
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airport"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Geo]
      operationId: updateAirport
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirportRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Geo]
      operationId: deleteAirport
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/flights/calendar:
    get:
      tags: [Flights]
      operationId: getCalendar
      parameters:
        - $ref: "#/components/parameters/DepartureAirportCodeParam"
        - $ref: "#/components/parameters/ArrivalAirportCodeParam"
        - $ref: "#/components/parameters/DateFromParam"
        - $ref: "#/components/parameters/DateToParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/flights/search:
    get:
      tags: [Flights]
      operationId: searchFlights
      parameters:
        - $ref: "#/components/parameters/DepartureAirportCodeParam"
        - $ref: "#/components/parameters/ArrivalAirportCodeParam"
        - $ref: "#/components/parameters/DepartureDateParam"
        - $ref: "#/components/parameters/ReturnDateParam"
        - $ref: "#/components/parameters/AdultCountParam"
        - $ref: "#/components/parameters/ChildCountParam"
        - $ref: "#/components/parameters/InfantCountParam"
        - $ref: "#/components/parameters/MinPriceParam"
        - $ref: "#/components/parameters/MaxPriceParam"
        - $ref: "#/components/parameters/MinSegmentsParam"
        - $ref: "#/components/parameters/MaxSegmentsParam"
        - $ref: "#/components/parameters/MinTotalDurationMinutesParam"
        - $ref: "#/components/parameters/MaxTotalDurationMinutesParam"
        - $ref: "#/components/parameters/MinIndividualSegmentDurationMinutesParam"
        - $ref: "#/components/parameters/MaxIndividualSegmentDurationMinutesParam"
        - $ref: "#/components/parameters/MinLayoverMinutesParam"
        - $ref: "#/components/parameters/MaxLayoverMinutesParam"
        - $ref: "#/components/parameters/DepartureOutboundFromParam"
        - $ref: "#/components/parameters/DepartureOutboundToParam"
        - $ref: "#/components/parameters/ArrivalOutboundFromParam"
        - $ref: "#/components/parameters/ArrivalOutboundToParam"
        - $ref: "#/components/parameters/DepartureInboundFromParam"
        - $ref: "#/components/parameters/DepartureInboundToParam"
        - $ref: "#/components/parameters/ArrivalInboundFromParam"
        - $ref: "#/components/parameters/ArrivalInboundToParam"
      responses:
        "200":
          description: Server-sent events stream. Emits `search_id`, `offers`, and `done` events.
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: search_id
                data: {"search_id":"..."}

                event: offers
                data: {"offers":[]}

                event: done
                data: {"search_id":"..."}
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  parameters:
    IDParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    SearchParam:
      name: search
      in: query
      required: true
      schema:
        type: string
        minLength: 2
    OriginAirportCodeParam:
      name: originAirportCode
      in: query
      required: false
      schema:
        type: string
        pattern: "^[A-Za-z]{3}$"
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 5
        maximum: 100
        default: 50
    DepartureAirportCodeParam:
      name: departureAirportCode
      in: query
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 3
        pattern: "^[A-Z]{3}$"
        x-oapi-codegen-extra-tags:
          validate: required,len=3,uppercase,alpha
    ArrivalAirportCodeParam:
      name: arrivalAirportCode
      in: query
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 3
        pattern: "^[A-Z]{3}$"
        x-oapi-codegen-extra-tags:
          validate: required,len=3,uppercase,alpha
    DepartureDateParam:
      name: departureDate
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    ReturnDateParam:
      name: returnDate
      in: query
      required: false
      schema:
        type: string
        format: date
    DateFromParam:
      name: dateFrom
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    DateToParam:
      name: dateTo
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    AdultCountParam:
      name: adultCount
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        format: int32
        x-oapi-codegen-extra-tags:
          validate: required,min=1
    ChildCountParam:
      name: childCount
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    InfantCountParam:
      name: infantCount
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinPriceParam:
      name: minPrice
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        format: double
    MaxPriceParam:
      name: maxPrice
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        format: double
    MinSegmentsParam:
      name: minSegments
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxSegmentsParam:
      name: maxSegments
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinTotalDurationMinutesParam:
      name: minTotalDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxTotalDurationMinutesParam:
      name: maxTotalDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinIndividualSegmentDurationMinutesParam:
      name: minIndividualSegmentDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxIndividualSegmentDurationMinutesParam:
      name: maxIndividualSegmentDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinLayoverMinutesParam:
      name: minLayoverMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxLayoverMinutesParam:
      name: maxLayoverMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    DepartureOutboundFromParam:
      name: departureOutboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureOutboundToParam:
      name: departureOutboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalOutboundFromParam:
      name: arrivalOutboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalOutboundToParam:
      name: arrivalOutboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureInboundFromParam:
      name: departureInboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureInboundToParam:
      name: departureInboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalInboundFromParam:
      name: arrivalInboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalInboundToParam:
      name: arrivalInboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
  schemas:
    CountryRequest:
      type: object
      required: [name_ro, name_ru, name_en, iso3, iso2]
      properties:
        name_ro:
          type: string
        name_ru:
          type: string
        name_en:
          type: string
        iso3:
          type: string
          minLength: 3
          maxLength: 3
        iso2:
          type: string
          minLength: 2
          maxLength: 2
    Country:
      allOf:
        - $ref: "#/components/schemas/CountryRequest"
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
    CityRequest:
      type: object
      required: [country_id, name_ro, name_ru, name_en]
      properties:
        country_id:
          type: integer
          format: int64
        name_ro:
          type: string
        name_ru:
          type: string
        name_en:
          type: string
        is_capital:
          type: boolean
        population:
          type: integer
          format: int64
        timezone:
          type: string
    City:
      allOf:
        - $ref: "#/components/schemas/CityRequest"
        - type: object
          required: [id, is_capital]
          properties:
            id:
              type: integer
              format: int64
    AirportRequest:
      type: object
      required: [city_id]
      properties:
        city_id:
          type: integer
          format: int64
        iata_code:
          type: string
        icao_code:
          type: string
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
    Airport:
      allOf:
        - $ref: "#/components/schemas/AirportRequest"
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
    CityDropdown:
      type: object
      required: [id, name, country_name, airport_code]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        country_name:
          type: string
        airport_code:
          type: string
    CalendarResponse:
      type: object
      required: [calendar]
      properties:
        calendar:
          type: array
          items:
            $ref: "#/components/schemas/FlightDay"
    FlightDay:
      type: object
      required: [date, price, currency_code]
      properties:
        date:
          type: string
          format: date
        price:
          type: number
          format: double
        currency_code:
          type: string
    FlightSearchResponse:
      type: object
      required: [search_id, routing_id, offers]
      properties:
        search_id:
          type: string
        routing_id:
          type: string
        offers:
          type: array
          items:
            $ref: "#/components/schemas/Offer"
    Offer:
      type: object
      required: [offer_id, outbound_flight, currency_code, price]
      properties:
        offer_id:
          type: string
        outbound_flight:
          $ref: "#/components/schemas/Flight"
        inbound_flight:
          $ref: "#/components/schemas/Flight"
        currency_code:
          type: string
        price:
          type: number
          format: double
    Flight:
      type: object
      required: [departure_airport_code, arrival_airport_code, seats_available, segments, price]
      properties:
        departure_airport_code:
          type: string
        arrival_airport_code:
          type: string
        seats_available:
          type: integer
          format: int32
        price:
          type: number
          format: double
        segments:
          type: array
          items:
            $ref: "#/components/schemas/FlightSegment"
    FlightSegment:
      type: object
      required: [segment_id, departure_airport_code, arrival_airport_code]
      properties:
        segment_id:
          type: integer
          format: int32
        departure_airport_code:
          type: string
        arrival_airport_code:
          type: string
        departure_time:
          type: string
          format: date-time
        arrival_time:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          format: int32
        flight_number:
          type: string
        travel_class:
          type: string
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
