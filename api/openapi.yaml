openapi: 3.0.0

info:
  title: AVMD Search Engine API
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Flights

paths:
  /api/v1/flights/calendar:
    get:
      tags: [Flights]
      operationId: getCalendar
      parameters:
        - $ref: "#/components/parameters/DepartureAirportCodeParam"
        - $ref: "#/components/parameters/ArrivalAirportCodeParam"
        - $ref: "#/components/parameters/DateFromParam"
        - $ref: "#/components/parameters/DateToParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/flights/search:
    get:
      tags: [Flights]
      operationId: searchFlights
      parameters:
        - $ref: "#/components/parameters/DepartureAirportCodeParam"
        - $ref: "#/components/parameters/ArrivalAirportCodeParam"
        - $ref: "#/components/parameters/DepartureDateParam"
        - $ref: "#/components/parameters/ReturnDateParam"
        - $ref: "#/components/parameters/AdultCountParam"
        - $ref: "#/components/parameters/ChildCountParam"
        - $ref: "#/components/parameters/InfantCountParam"
        - $ref: "#/components/parameters/MinPriceParam"
        - $ref: "#/components/parameters/MaxPriceParam"
        - $ref: "#/components/parameters/MinSegmentsParam"
        - $ref: "#/components/parameters/MaxSegmentsParam"
        - $ref: "#/components/parameters/MinTotalDurationMinutesParam"
        - $ref: "#/components/parameters/MaxTotalDurationMinutesParam"
        - $ref: "#/components/parameters/MinIndividualSegmentDurationMinutesParam"
        - $ref: "#/components/parameters/MaxIndividualSegmentDurationMinutesParam"
        - $ref: "#/components/parameters/MinLayoverMinutesParam"
        - $ref: "#/components/parameters/MaxLayoverMinutesParam"
        - $ref: "#/components/parameters/DepartureOutboundFromParam"
        - $ref: "#/components/parameters/DepartureOutboundToParam"
        - $ref: "#/components/parameters/ArrivalOutboundFromParam"
        - $ref: "#/components/parameters/ArrivalOutboundToParam"
        - $ref: "#/components/parameters/DepartureInboundFromParam"
        - $ref: "#/components/parameters/DepartureInboundToParam"
        - $ref: "#/components/parameters/ArrivalInboundFromParam"
        - $ref: "#/components/parameters/ArrivalInboundToParam"
      responses:
        "200":
          description: Server-sent events stream. Emits `search_id`, `offers`, and `done` events.
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: search_id
                data: {"search_id":"..."}

                event: offers
                data: {"offers":[]}

                event: done
                data: {"search_id":"..."}
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    DepartureAirportCodeParam:
      name: departureAirportCode
      in: query
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 3
        pattern: "^[A-Z]{3}$"
        x-oapi-codegen-extra-tags:
          validate: required,len=3,uppercase,alpha
    ArrivalAirportCodeParam:
      name: arrivalAirportCode
      in: query
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 3
        pattern: "^[A-Z]{3}$"
        x-oapi-codegen-extra-tags:
          validate: required,len=3,uppercase,alpha
    DepartureDateParam:
      name: departureDate
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    ReturnDateParam:
      name: returnDate
      in: query
      required: false
      schema:
        type: string
        format: date
    DateFromParam:
      name: dateFrom
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    DateToParam:
      name: dateTo
      in: query
      required: true
      schema:
        type: string
        format: date
        x-oapi-codegen-extra-tags:
          validate: required
    AdultCountParam:
      name: adultCount
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        format: int32
        x-oapi-codegen-extra-tags:
          validate: required,min=1
    ChildCountParam:
      name: childCount
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    InfantCountParam:
      name: infantCount
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinPriceParam:
      name: minPrice
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        format: double
    MaxPriceParam:
      name: maxPrice
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        format: double
    MinSegmentsParam:
      name: minSegments
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxSegmentsParam:
      name: maxSegments
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinTotalDurationMinutesParam:
      name: minTotalDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxTotalDurationMinutesParam:
      name: maxTotalDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinIndividualSegmentDurationMinutesParam:
      name: minIndividualSegmentDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxIndividualSegmentDurationMinutesParam:
      name: maxIndividualSegmentDurationMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MinLayoverMinutesParam:
      name: minLayoverMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    MaxLayoverMinutesParam:
      name: maxLayoverMinutes
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        format: int32
    DepartureOutboundFromParam:
      name: departureOutboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureOutboundToParam:
      name: departureOutboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalOutboundFromParam:
      name: arrivalOutboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalOutboundToParam:
      name: arrivalOutboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureInboundFromParam:
      name: departureInboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    DepartureInboundToParam:
      name: departureInboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalInboundFromParam:
      name: arrivalInboundFrom
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
    ArrivalInboundToParam:
      name: arrivalInboundTo
      in: query
      required: false
      schema:
        type: string
        pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
  schemas:
    CalendarResponse:
      type: object
      required: [calendar]
      properties:
        calendar:
          type: array
          items:
            $ref: "#/components/schemas/FlightDay"
    FlightDay:
      type: object
      required: [date, price, currency_code]
      properties:
        date:
          type: string
          format: date
        price:
          type: number
          format: double
        currency_code:
          type: string
    FlightSearchResponse:
      type: object
      required: [search_id, routing_id, offers]
      properties:
        search_id:
          type: string
        routing_id:
          type: string
        offers:
          type: array
          items:
            $ref: "#/components/schemas/Offer"
    Offer:
      type: object
      required: [offer_id, outbound_flight, currency_code, price]
      properties:
        offer_id:
          type: string
        outbound_flight:
          $ref: "#/components/schemas/Flight"
        inbound_flight:
          $ref: "#/components/schemas/Flight"
        currency_code:
          type: string
        price:
          type: number
          format: double
    Flight:
      type: object
      required: [departure_airport_code, arrival_airport_code, seats_available, segments, price]
      properties:
        departure_airport_code:
          type: string
        arrival_airport_code:
          type: string
        seats_available:
          type: integer
          format: int32
        price:
          type: number
          format: double
        segments:
          type: array
          items:
            $ref: "#/components/schemas/FlightSegment"
    FlightSegment:
      type: object
      required: [segment_id, departure_airport_code, arrival_airport_code]
      properties:
        segment_id:
          type: integer
          format: int32
        departure_airport_code:
          type: string
        arrival_airport_code:
          type: string
        departure_time:
          type: string
          format: date-time
        arrival_time:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          format: int32
        flight_number:
          type: string
        travel_class:
          type: string
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
